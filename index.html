<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>每日一瘦 · 健康与身材记事</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    /* INTJ 气质：深色基底、结构网格、衬线标题、等宽数据、低饱和金作唯一强调色 */

    :root {
      --bg-0: #0a0c0f;
      --bg-1: #12161c;
      --card: rgba(18, 22, 28, 0.78);
      --card-edge: rgba(201, 169, 98, 0.14);
      --text: #e6e8ec;
      --muted: #8b919b;
      --accent: #c9a962;
      --accent-dim: rgba(201, 169, 98, 0.12);
      --line: rgba(255, 255, 255, 0.06);
      --input-bg: rgba(8, 10, 14, 0.65);
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
      --radius-lg: 14px;
      --radius-md: 8px;
      --radius-sm: 6px;
      --font-serif: "Noto Serif SC", "Songti SC", serif;
      --font-sans: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-mono: "JetBrains Mono", "Consolas", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      color-scheme: dark;
    }

    body {
      font-family: var(--font-sans);
      font-weight: 400;
      background-color: var(--bg-0);
      color: var(--text);
      min-height: 100vh;
      padding: 22px 18px 40px;
      position: relative;
      overflow-x: hidden;
    }

    /* 背景：极淡坐标网格 + 径向光晕，营造「图纸」感 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 169, 98, 0.07), transparent 55%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 62%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      mask-image: radial-gradient(ellipse 90% 70% at 50% 30%, #000 25%, transparent 75%);
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .app-header {
      margin-bottom: 26px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .brand-line {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin-bottom: 14px;
    }

    .app-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .app-title {
      font-family: var(--font-serif);
      font-size: clamp(1.75rem, 4.2vw, 2.35rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .app-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 300;
      max-width: 36em;
      line-height: 1.65;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-edge);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 22px;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 24px;
      right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
      opacity: 0.9;
    }

    .card-head {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .card-index {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--accent);
      border: 1px solid var(--card-edge);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      background: var(--accent-dim);
    }

    .card-title {
      font-family: var(--font-serif);
      font-size: 1.08rem;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .card-en {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-left: 6px;
    }

    .card-desc {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 300;
      line-height: 1.55;
    }

    .section {
      margin-bottom: 16px;
    }

    .section:last-of-type {
      margin-bottom: 0;
    }

    .section-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .grid-three {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .grid-four {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .section--spaced {
      margin-top: 16px;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--input-bg);
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .input::placeholder,
    .textarea::placeholder {
      color: rgba(139, 145, 155, 0.65);
    }

    .input:focus,
    .textarea:focus {
      border-color: rgba(201, 169, 98, 0.45);
      box-shadow: 0 0 0 1px rgba(201, 169, 98, 0.2);
    }

    .textarea {
      min-height: 96px;
      resize: vertical;
    }

    .water-counter {
      display: inline-flex;
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--input-bg);
    }

    .counter-btn {
      width: 44px;
      border: none;
      background: transparent;
      font-family: var(--font-mono);
      font-size: 1.1rem;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.2s;
    }

    .counter-btn:hover {
      background: var(--accent-dim);
    }

    .counter-value {
      min-width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 500;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0 12px;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--card-edge);
      border-radius: var(--radius-md);
      padding: 11px 20px;
      cursor: pointer;
      transition: transform 0.06s, background 0.2s, border-color 0.2s;
      font-weight: 500;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      background: transparent;
      color: var(--text);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(145deg, rgba(201, 169, 98, 0.22), rgba(201, 169, 98, 0.08));
      border-color: rgba(201, 169, 98, 0.35);
      color: #f0e6d4;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
    }

    .btn-primary:hover {
      border-color: rgba(201, 169, 98, 0.55);
      background: linear-gradient(145deg, rgba(201, 169, 98, 0.3), rgba(201, 169, 98, 0.1));
    }

    .date-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .date-row label {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .tip {
      margin-top: 4px;
      margin-bottom: 4px;
      font-size: 0.82rem;
      color: var(--muted);
      border-left: 2px solid var(--accent);
      padding: 10px 12px;
      background: rgba(201, 169, 98, 0.06);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      line-height: 1.55;
      font-weight: 300;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      margin-top: 16px;
      background: var(--input-bg);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: center;
      font-size: 0.82rem;
    }

    th {
      font-family: var(--font-sans);
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      background: rgba(201, 169, 98, 0.05);
    }

    td {
      font-family: var(--font-mono);
      color: var(--text);
    }

    td:first-child {
      font-family: var(--font-mono);
      color: var(--accent);
      opacity: 0.95;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(201, 169, 98, 0.04);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 18px 12px;
      font-size: 0.88rem;
      font-family: var(--font-sans);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      background: rgba(18, 22, 28, 0.95);
      color: var(--text);
      padding: 11px 20px;
      border-radius: var(--radius-md);
      font-size: 0.82rem;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
      border: 1px solid var(--card-edge);
      transition: opacity 0.28s, transform 0.28s;
      z-index: 99;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 860px) {
      body {
        padding: 32px 28px 48px;
      }

      .layout {
        grid-template-columns: 1.05fr 1fr;
        gap: 22px;
        align-items: start;
      }

      .grid-three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-four {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="brand-line" aria-hidden="true"></div>
      <p class="app-eyebrow">Local only · 数据不离设备</p>
      <h1 class="app-title">每日一瘦</h1>
      <p class="app-subtitle">
        以日为单位梳理饮食、饮水与运动；以周为粒度采集围度与体重。界面为私密记录而设计——克制、清晰、可长期留存。
      </p>
    </header>

    <main class="layout">
      <!-- 模块一：每日习惯打卡 -->
      <section class="card" aria-labelledby="daily-title">
        <div class="card-head">
          <span class="card-index" aria-hidden="true">I</span>
          <div>
            <h2 id="daily-title" class="card-title">日课流水<span class="card-en">Daily</span></h2>
            <p class="card-desc">选定日期后填写，保存即写入本地；切换日期可检索历史日课。</p>
          </div>
        </div>

        <div class="date-row">
          <label for="dailyDate">记录日期</label>
          <input id="dailyDate" class="input" type="date" />
        </div>

        <div class="section">
          <span class="section-label">三餐记录</span>
          <div class="grid-three">
            <input id="breakfast" class="input" type="text" placeholder="早餐吃了什么" />
            <input id="lunch" class="input" type="text" placeholder="午餐吃了什么" />
            <input id="dinner" class="input" type="text" placeholder="晚餐吃了什么" />
          </div>
        </div>

        <div class="section">
          <span class="section-label">饮水追踪</span>
          <div class="water-counter" role="group" aria-label="饮水计数器">
            <button id="waterMinus" class="counter-btn" type="button" aria-label="减少一杯">-</button>
            <div id="waterValue" class="counter-value">0 杯</div>
            <button id="waterPlus" class="counter-btn" type="button" aria-label="增加一杯">+</button>
          </div>
        </div>

        <div class="section">
          <label class="section-label" for="exercise">运动记录</label>
          <textarea
            id="exercise"
            class="textarea"
            placeholder="例如：慢跑30分钟 + 拉伸10分钟"></textarea>
        </div>

        <div class="actions">
          <button id="saveDailyBtn" class="btn btn-primary" type="button">保存今日记录</button>
        </div>
      </section>

      <!-- 模块二：每周身材数据追踪 -->
      <section class="card" aria-labelledby="weekly-title">
        <div class="card-head">
          <span class="card-index" aria-hidden="true">II</span>
          <div>
            <h2 id="weekly-title" class="card-title">围度索引<span class="card-en">Weekly</span></h2>
            <p class="card-desc">建议每周固定相同时段测量一次，降低偶然波动带来的误判。</p>
          </div>
        </div>
        <p class="tip">同一日期的记录会被覆盖为最新一条，便于你把「本周正式数据」一次性敲定。</p>

        <div class="section section--spaced">
          <div class="grid-four">
            <div>
              <label class="section-label" for="measureDate">日期</label>
              <input id="measureDate" class="input" type="date" />
            </div>
            <div>
              <label class="section-label" for="weight">体重（kg）</label>
              <input id="weight" class="input" type="number" step="0.1" min="0" placeholder="如 52.3" />
            </div>
            <div>
              <label class="section-label" for="chest">胸围（cm）</label>
              <input id="chest" class="input" type="number" step="0.1" min="0" placeholder="如 85" />
            </div>
            <div>
              <label class="section-label" for="waist">腰围（cm）</label>
              <input id="waist" class="input" type="number" step="0.1" min="0" placeholder="如 68" />
            </div>
            <div>
              <label class="section-label" for="hip">臀围（cm）</label>
              <input id="hip" class="input" type="number" step="0.1" min="0" placeholder="如 92" />
            </div>
            <div>
              <label class="section-label" for="abdomen">小腹围（cm）</label>
              <input id="abdomen" class="input" type="number" step="0.1" min="0" placeholder="如 75" />
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="addMeasureBtn" class="btn btn-primary" type="button">添加本周数据</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>体重(kg)</th>
                <th>胸围(cm)</th>
                <th>腰围(cm)</th>
                <th>臀围(cm)</th>
                <th>小腹围(cm)</th>
              </tr>
            </thead>
            <tbody id="measureTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // -----------------------------
    // 通用工具：日期和提示
    // -----------------------------
    const STORAGE_KEYS = {
      daily: "health_app_daily_records",
      weekly: "health_app_weekly_measurements"
    };

    function getTodayString() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1600);
    }

    function parseJSONSafe(raw, fallback) {
      try {
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) {
        return fallback;
      }
    }

    // -----------------------------
    // 模块一：每日习惯打卡逻辑
    // -----------------------------
    const dailyDateEl = document.getElementById("dailyDate");
    const breakfastEl = document.getElementById("breakfast");
    const lunchEl = document.getElementById("lunch");
    const dinnerEl = document.getElementById("dinner");
    const exerciseEl = document.getElementById("exercise");
    const waterValueEl = document.getElementById("waterValue");
    const waterMinusEl = document.getElementById("waterMinus");
    const waterPlusEl = document.getElementById("waterPlus");
    const saveDailyBtn = document.getElementById("saveDailyBtn");

    let waterCount = 0;

    function getDailyAllRecords() {
      const raw = localStorage.getItem(STORAGE_KEYS.daily);
      return parseJSONSafe(raw, {});
    }

    function setDailyAllRecords(data) {
      localStorage.setItem(STORAGE_KEYS.daily, JSON.stringify(data));
    }

    function renderWaterCount() {
      waterValueEl.textContent = waterCount + " 杯";
    }

    function loadDailyByDate(dateStr) {
      const all = getDailyAllRecords();
      const record = all[dateStr] || {
        breakfast: "",
        lunch: "",
        dinner: "",
        water: 0,
        exercise: ""
      };

      breakfastEl.value = record.breakfast;
      lunchEl.value = record.lunch;
      dinnerEl.value = record.dinner;
      exerciseEl.value = record.exercise;
      waterCount = Number(record.water) || 0;
      renderWaterCount();
    }

    function saveDailyByCurrentDate() {
      const dateStr = dailyDateEl.value;
      if (!dateStr) {
        showToast("请先选择日期");
        return;
      }

      const all = getDailyAllRecords();
      all[dateStr] = {
        breakfast: breakfastEl.value.trim(),
        lunch: lunchEl.value.trim(),
        dinner: dinnerEl.value.trim(),
        water: waterCount,
        exercise: exerciseEl.value.trim(),
        updatedAt: Date.now()
      };
      setDailyAllRecords(all);

      // 轻量按钮反馈
      const oldText = saveDailyBtn.textContent;
      saveDailyBtn.textContent = "已保存";
      window.setTimeout(() => {
        saveDailyBtn.textContent = oldText;
      }, 1200);

      showToast("今日记录已保存");
    }

    dailyDateEl.addEventListener("change", () => {
      loadDailyByDate(dailyDateEl.value);
    });

    waterMinusEl.addEventListener("click", () => {
      waterCount = Math.max(0, waterCount - 1);
      renderWaterCount();
    });

    waterPlusEl.addEventListener("click", () => {
      waterCount += 1;
      renderWaterCount();
    });

    saveDailyBtn.addEventListener("click", saveDailyByCurrentDate);

    // -----------------------------
    // 模块二：每周身材数据追踪逻辑
    // -----------------------------
    const measureDateEl = document.getElementById("measureDate");
    const weightEl = document.getElementById("weight");
    const chestEl = document.getElementById("chest");
    const waistEl = document.getElementById("waist");
    const hipEl = document.getElementById("hip");
    const abdomenEl = document.getElementById("abdomen");
    const addMeasureBtn = document.getElementById("addMeasureBtn");
    const measureTableBody = document.getElementById("measureTableBody");

    function getWeeklyRecords() {
      const raw = localStorage.getItem(STORAGE_KEYS.weekly);
      return parseJSONSafe(raw, []);
    }

    function setWeeklyRecords(data) {
      localStorage.setItem(STORAGE_KEYS.weekly, JSON.stringify(data));
    }

    function toNumberOrEmpty(value) {
      if (value === "" || value === null || value === undefined) return "";
      const n = Number(value);
      return Number.isFinite(n) ? n : "";
    }

    function renderWeeklyTable() {
      const records = getWeeklyRecords()
        .slice()
        .sort((a, b) => (a.date < b.date ? 1 : -1));

      if (records.length === 0) {
        measureTableBody.innerHTML = '<tr><td colspan="6" class="empty">暂无记录，先添加一条本周数据吧。</td></tr>';
        return;
      }

      const rows = records.map((item) => {
        return (
          "<tr>" +
          "<td>" + item.date + "</td>" +
          "<td>" + (item.weight ?? "") + "</td>" +
          "<td>" + (item.chest ?? "") + "</td>" +
          "<td>" + (item.waist ?? "") + "</td>" +
          "<td>" + (item.hip ?? "") + "</td>" +
          "<td>" + (item.abdomen ?? "") + "</td>" +
          "</tr>"
        );
      });

      measureTableBody.innerHTML = rows.join("");
    }

    function addWeeklyMeasurement() {
      const date = measureDateEl.value;
      if (!date) {
        showToast("请选择日期");
        return;
      }

      const entry = {
        date,
        weight: toNumberOrEmpty(weightEl.value),
        chest: toNumberOrEmpty(chestEl.value),
        waist: toNumberOrEmpty(waistEl.value),
        hip: toNumberOrEmpty(hipEl.value),
        abdomen: toNumberOrEmpty(abdomenEl.value),
        createdAt: Date.now()
      };

      const records = getWeeklyRecords();
      const existingIndex = records.findIndex((r) => r.date === date);

      // 同一天的周记录进行覆盖，保证每周一条更清晰
      if (existingIndex >= 0) {
        records[existingIndex] = entry;
      } else {
        records.push(entry);
      }

      setWeeklyRecords(records);
      renderWeeklyTable();

      const oldText = addMeasureBtn.textContent;
      addMeasureBtn.textContent = "已添加";
      window.setTimeout(() => {
        addMeasureBtn.textContent = oldText;
      }, 1200);

      showToast("每周数据已保存");
    }

    addMeasureBtn.addEventListener("click", addWeeklyMeasurement);

    // -----------------------------
    // 初始化
    // -----------------------------
    function init() {
      const today = getTodayString();
      dailyDateEl.value = today;
      measureDateEl.value = today;
      loadDailyByDate(today);
      renderWeeklyTable();
    }

    init();
  </script>
</body>
</html>
